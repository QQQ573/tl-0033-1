server:
  port: 8080

spring:
  application:
    name: golden-monkey-adoption
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/golden_monkey?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:monkey_user}
    password: ${SPRING_DATASOURCE_PASSWORD:monkey_pass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true

app:
  certificate:
    output-path: ./certificates
    template-path: classpath:templates/certificate/
  payment:
    callback-url: ${PAYMENT_CALLBACK_URL:http://localhost:8080/api/payment/callback}
